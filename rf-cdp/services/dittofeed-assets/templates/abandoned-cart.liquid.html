<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.gen_subject | default: "..." }}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f1e8;
            font-family: Inter, Arial, sans-serif;
            color: #2a221c;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #1a1410;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 24px;
            font-weight: 900;
            margin: 0;
        }
        .header .bar {
            display: inline-block;
            width: 30px;
            height: 2px;
            background-color: #d4513a;
            margin: 0 5px;
        }
        .eyebrow {
            font-family: Inter, Arial, sans-serif;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            color: #b3402c;
            margin-bottom: 10px;
        }
        .card {
            background-color: #fffdf7;
            border: 1px solid #e5e0d4;
            border-radius: 18px;
            padding: 20px;
            margin-top: 20px;
        }
        .cta {
            display: inline-block;
            background-color: #d4513a;
            color: white;
            text-transform: uppercase;
            font-family: Inter, Arial, sans-serif;
            font-weight: 700;
            border-radius: 999px;
            padding: 10px 20px;
            text-decoration: none;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #6b6258;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ZAVOD<span class="bar"></span></h1>
        </div>
        <div class="eyebrow">Вы кое-что забыли</div>
        <div class="card">
            {{ user.gen_body_html | default: "<p>Ваши товары в корзине ждут вас!</p>" }}
            <a href="{{ catalog_url | default: 'https://zavod.dev/catalog' }}" class="cta">Вернуться в корзину</a>
        </div>
        <div class="footer">
            <p>Если вы хотите отписаться от рассылки, <a href="{{ unsubscribe_url | default: '#' }}" style="color: #6b6258;">нажмите здесь</a>.</p>
        </div>
    </div>
</body>
</html>
