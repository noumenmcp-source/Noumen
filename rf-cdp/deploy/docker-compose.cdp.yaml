# Whole-CDP stack for the permanent host: Dittofeed lite (4 services) + ingest-gateway, wired.
# Storefront -> ingest-gateway (:8110) -> raw ES audit + forward to Dittofeed lite (:3000).
#
# The four dittofeed services (lite, temporal, postgres, clickhouse-server) are reused verbatim
# from vendor/dittofeed/docker-compose.lite.yaml (same images, env anchors, ports, named volumes,
# network). Only the ingest-gateway service is added on the same network so the loop closes.
#
# Usage:
#   cp deploy/.env.example deploy/.env   # then fill secrets
#   docker compose -f deploy/docker-compose.cdp.yaml --env-file deploy/.env up -d
#
# Optional profiles inherited from lite: admin-cli, temporal-ui (start with --profile <name>).
x-database-credentials: &database-credentials
  DATABASE_USER: ${DATABASE_USER:-postgres}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
x-clickhouse-credentials: &clickhouse-credentials
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dittofeed}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
x-backend-app-env: &backend-app-env
  <<: [*clickhouse-credentials, *database-credentials]
  NODE_ENV: production
  DATABASE_HOST: ${DATABASE_HOST:-postgres}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-http://clickhouse-server:8123}
  TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
  WORKSPACE_NAME: ${WORKSPACE_NAME:-Default}
  AUTH_MODE: ${AUTH_MODE:-single-tenant}
  SECRET_KEY: ${SECRET_KEY:-GEGL1RHjFVOxIO80Dp8+ODlZPOjm2IDBJB/UunHlf3c=}
  PASSWORD: ${PASSWORD:-password}
  DASHBOARD_API_BASE: ${DASHBOARD_API_BASE:-http://localhost:3000}
services:
  # ---------------------------------------------------------------------------
  # Dittofeed lite (reused verbatim from vendor/dittofeed/docker-compose.lite.yaml)
  # ---------------------------------------------------------------------------
  lite:
    image: ${IMAGE_REPOSITORY:-dittofeed/dittofeed-lite}:${IMAGE_TAG:-v0.23.0}
    restart: always
    command: node --max-old-space-size=${LITE_MEM_LIMIT:-824} ./packages/lite/dist/scripts/startLite.js --workspace-name=${WORKSPACE_NAME:-Default}
    logging:
      driver: "local"
    deploy:
      resources:
        limits:
          memory: ${LITE_CONTAINER_MEM_LIMIT:-1024}m
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres
      - temporal
      - clickhouse-server
    environment:
      <<: *backend-app-env
      # comment out after initial setup
      BOOTSTRAP: ${BOOTSTRAP:-true}
    networks:
      - dittofeed-network-lite
  # useful for upgrading dittofeed
  admin-cli:
    image: dittofeed/dittofeed-admin-cli:${IMAGE_TAG:-v0.23.0}
    entrypoint: []
    profiles: ["admin-cli"]
    command: tail -f /dev/null
    tty: true
    logging:
      driver: "local"
    depends_on:
      - postgres
      - temporal
      - clickhouse-server
    environment:
      <<: *backend-app-env
    networks:
      - dittofeed-network-lite
  temporal:
    container_name: temporal
    restart: always
    logging:
      driver: "local"
    depends_on:
      - postgres
    environment:
      - DB=postgresql
      - DB_PORT=${DATABASE_PORT:-5432}
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PWD=${DATABASE_PASSWORD:-password}
      - POSTGRES_SEEDS=${DATABASE_HOST:-postgres}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/prod.yaml
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.22.4}
    labels:
      kompose.volume.type: configMap
    networks:
      - dittofeed-network-lite
    ports:
      - 7233:7233
    volumes:
      # Path is relative to this compose file (deploy/) -> vendor checkout.
      - ../vendor/dittofeed/packages/backend-lib/temporal-dynamicconfig:/etc/temporal/config/dynamicconfig
  temporal-ui:
    profiles: ["temporal-ui"]
    container_name: temporal-ui
    restart: always
    logging:
      driver: "local"
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.22.1}
    networks:
      - dittofeed-network-lite
    ports:
      - 8080:8080
  postgres:
    image: postgres:${POSTGRES_VERSION:-15}
    restart: always
    logging:
      driver: "local"
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-password}
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_DB=dittofeed
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - dittofeed-network-lite
  clickhouse-server:
    image: clickhouse/clickhouse-server:24.12.6.70-alpine
    restart: always
    logging:
      driver: "local"
    deploy:
      resources:
        limits:
          memory: ${CLICKHOUSE_CONTAINER_MEM_LIMIT:-2048}m
    environment:
      <<: *clickhouse-credentials
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9009:9009"
    volumes:
      - clickhouse_lib:/var/lib/clickhouse
      - clickhouse_log:/var/log/clickhouse-server
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # Elasticsearch — raw event audit store (per-tenant index cdp_events_<siteId>).
  # Self-contained in the stack so the whole CDP travels as one compose.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: always
    logging:
      driver: "local"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    deploy:
      resources:
        limits:
          memory: ${ES_CONTAINER_MEM_LIMIT:-1280}m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # CDP ingest-gateway v3 (multi-tenant) — closes the loop, isolates per site.
  # x-write-key -> tenant (tenants.json) -> own ES index + own Dittofeed workspace.
  # ---------------------------------------------------------------------------
  ingest-gateway:
    build:
      context: ../services/ingest-gateway-prod
      dockerfile: Dockerfile
    image: cdp/ingest-gateway:${INGEST_GATEWAY_TAG:-local}
    stop_grace_period: 15s
    restart: always
    logging:
      driver: "local"
    depends_on:
      - lite
      - elasticsearch
    environment:
      PORT: ${GATEWAY_PORT:-8110}
      # Multi-tenant: keys/indices/origins come from the mounted tenants.json, NOT env.
      TENANTS_FILE: /app/tenants.json
      ES_URL: ${ES_URL:-http://elasticsearch:9200}
      ES_USER: ${ES_USER:-elastic}
      ES_PASSWORD: ${ES_PASSWORD:-}
      # Base Dittofeed URL; per-tenant workspace + write-key live in tenants.json.
      DITTOFEED_URL: ${DITTOFEED_URL:-http://lite:3000}
      QUEUE_MAX: ${QUEUE_MAX:-100000}
      BULK_FLUSH_SIZE: ${BULK_FLUSH_SIZE:-1000}
      BULK_FLUSH_MS: ${BULK_FLUSH_MS:-200}
      FORWARD_CONCURRENCY: ${FORWARD_CONCURRENCY:-32}
    volumes:
      # Tenant registry — populated by scripts/provision_site.py. Read-only mount.
      - ../services/ingest-gateway-prod/tenants.json:/app/tenants.json:ro
    ports:
      - "${GATEWAY_PORT:-8110}:${GATEWAY_PORT:-8110}"
    networks:
      - dittofeed-network-lite
  cdp-admin:
    build:
      context: ../services/cdp-admin
      dockerfile: Dockerfile
    image: cdp/admin:local
    restart: always
    logging:
      driver: "local"
    depends_on:
      - elasticsearch
    environment:
      PORT: 8120
      ES_URL: ${ES_URL:-http://elasticsearch:9200}
      ES_USER: ${ES_USER:-elastic}
      ES_PASSWORD: ${ES_PASSWORD:-}
    ports:
      - "127.0.0.1:8120:8120"
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # CDP profile-engine — materializes unified profiles from cdp_events_<site>
  # into cdp_profiles_<site> (ported US core-cdp engine) + read/segment API.
  # ---------------------------------------------------------------------------
  profile-engine:
    build:
      context: ../services/profile-engine
      dockerfile: Dockerfile
    image: cdp/profile-engine:local
    restart: always
    logging:
      driver: "local"
    depends_on:
      - elasticsearch
    environment:
      PORT: 8130
      ES_URL: ${ES_URL:-http://elasticsearch:9200}
      ES_USER: ${ES_USER:-elastic}
      ES_PASSWORD: ${ES_PASSWORD:-}
      # Bearer token for the read/segment API; empty => API open (loopback-only).
      PROFILE_API_TOKEN: ${PROFILE_API_TOKEN:-}
      # Per-tenant tokens "site:token,..." => tenant isolation (152-ФЗ). Empty => off.
      PROFILE_TENANT_TOKENS: ${PROFILE_TENANT_TOKENS:-}
      MATERIALIZE_INTERVAL_MS: ${MATERIALIZE_INTERVAL_MS:-60000}
    ports:
      - "127.0.0.1:8130:8130"
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # CDP consent-ledger (152-ФЗ) — append-only signed hash-chain built from the
  # gateway's consent receipts (cdp_consent_<site>) + read/verify API.
  # ---------------------------------------------------------------------------
  consent-ledger:
    build:
      context: ../services/consent-ledger
      dockerfile: Dockerfile
    image: cdp/consent-ledger:local
    restart: always
    logging:
      driver: "local"
    depends_on:
      - elasticsearch
    environment:
      PORT: 8140
      ES_URL: ${ES_URL:-http://elasticsearch:9200}
      ES_USER: ${ES_USER:-elastic}
      ES_PASSWORD: ${ES_PASSWORD:-}
      CONSENT_API_TOKEN: ${CONSENT_API_TOKEN:-}
      # Per-tenant tokens "site:token,..." => tenant isolation (152-ФЗ). Empty => off.
      CONSENT_TENANT_TOKENS: ${CONSENT_TENANT_TOKENS:-}
      LEDGER_INTERVAL_MS: ${LEDGER_INTERVAL_MS:-60000}
      # Private Ed25519 signing key lives in this mounted volume, not in ES.
      CONSENT_KEY_DIR: /keys
    volumes:
      - consent_keys:/keys
    ports:
      - "127.0.0.1:8140:8140"
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # CDP email-ai (152-ФЗ) — AI marketing-email composer over profile-engine +
  # consent-ledger; mandatory marketing-consent gate. Delivery -> Dittofeed.
  # ---------------------------------------------------------------------------
  email-ai:
    build:
      context: ../services/email-ai
      dockerfile: Dockerfile
    image: cdp/email-ai:local
    restart: always
    logging:
      driver: "local"
    depends_on:
      - profile-engine
      - consent-ledger
    environment:
      PORT: 8150
      PROFILE_ENGINE_URL: ${PROFILE_ENGINE_URL:-http://profile-engine:8130}
      CONSENT_LEDGER_URL: ${CONSENT_LEDGER_URL:-http://consent-ledger:8140}
      # Optional OpenAI-compatible LLM gateway (Flot). Empty => deterministic RU template.
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      AI_GATEWAY_MODEL: ${AI_GATEWAY_MODEL:-gpt-5.5}
      EMAIL_API_TOKEN: ${EMAIL_API_TOKEN:-}
      # Sent as Bearer to profile-engine / consent-ledger — must equal their admin
      # tokens so service-to-service calls authenticate once isolation is enabled.
      PROFILE_API_TOKEN: ${PROFILE_API_TOKEN:-}
      CONSENT_API_TOKEN: ${CONSENT_API_TOKEN:-}
      # Per-tenant tokens for this service's own /v1/campaign API (152-ФЗ).
      EMAIL_TENANT_TOKENS: ${EMAIL_TENANT_TOKENS:-}
    ports:
      - "127.0.0.1:8150:8150"
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # CDP social-intel — deterministic social/intent + YouTube analysis API.
  # ---------------------------------------------------------------------------
  social-intel:
    build:
      context: ../services/social-intel
      dockerfile: Dockerfile
    image: cdp/social-intel:local
    restart: always
    logging:
      driver: "local"
    environment:
      PORT: 8160
      SOCIAL_API_TOKEN: ${SOCIAL_API_TOKEN:-}
    ports:
      - "127.0.0.1:8160:8160"
    networks:
      - dittofeed-network-lite
  # ---------------------------------------------------------------------------
  # CDP automation — scenario orchestrator (social + messenger) with a 152-ФЗ
  # marketing-messaging consent gate against the consent-ledger.
  # ---------------------------------------------------------------------------
  automation:
    build:
      context: ../services/automation
      dockerfile: Dockerfile
    image: cdp/automation:local
    restart: always
    logging:
      driver: "local"
    depends_on:
      - consent-ledger
    environment:
      PORT: 8170
      CONSENT_LEDGER_URL: ${CONSENT_LEDGER_URL:-http://consent-ledger:8140}
      AUTOMATION_API_TOKEN: ${AUTOMATION_API_TOKEN:-}
      # Sent as Bearer to consent-ledger — must equal its admin token (152-ФЗ gate).
      CONSENT_API_TOKEN: ${CONSENT_API_TOKEN:-}
      # Per-tenant tokens for this service's own /v1/automation API.
      AUTOMATION_TENANT_TOKENS: ${AUTOMATION_TENANT_TOKENS:-}
    ports:
      - "127.0.0.1:8170:8170"
    networks:
      - dittofeed-network-lite
volumes:
  postgres:
  clickhouse_lib:
  clickhouse_log:
  es_data:
  consent_keys:

networks:
  dittofeed-network-lite:
    driver: bridge
    name: dittofeed-network-lite
