name: CI

on:
  push:
  pull_request:

jobs:
  ingest-gateway:
    name: ingest-gateway-prod (Node 18)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingest-gateway-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: services/ingest-gateway-prod/package-lock.json
      - run: npm ci
      - name: Syntax check server.js
        run: node --check server.js

  ml-content-worker:
    name: ml-content-worker (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-content-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/ml-content-worker/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest tests -v
